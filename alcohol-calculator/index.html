<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alcohol Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>🍺 Alcohol Calculator PRO</h1>

        <label>Weight (kg)</label>
        <input type="number" id="weight" value="80">

        <label>Gender</label>
        <select id="gender">
            <option value="male">Male</option>
            <option value="female">Female</option>
        </select>

        <label>Alcohol Type</label>
        <select id="drinkType">
            <option value="beer">Beer</option>
            <option value="wine">Wine</option>
            <option value="vodka">Vodka</option>
            <option value="whisky">Whisky</option>
            <option value="gin">Gin</option>
        </select>

        <label>Number of Drinks</label>
        <input type="number" id="drinks" value="2">

        <label>Size Per Drink (ml)</label>
        <input type="number" id="size" value="500">

        <label>Alcohol %</label>
        <input type="number" id="percent" value="5">

        <label>Hours Drinking</label>
        <input type="number" id="hours" value="1">

        <label>Hours Slept Last Night</label>
        <input type="number" id="sleep" value="8">

        <label>Food Before Drinking</label>
        <select id="food">
            <option value="none">No Food</option>
            <option value="light">Light Meal</option>
            <option value="heavy">Heavy Meal</option>
        </select>

        <label>Age</label>
        <input type="number" id="age" value="25">

        <button id="calculateBtn">Calculate</button>

        <div id="result"></div>
        <label>Need to drive at</label>
        <input type="time" id="driveTime">

        <div id="driveResult"></div>

        <canvas id="bacChart"></canvas>
        <canvas id="bacChart"></canvas>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <script src="script.js"></script>
</body>
</html>
